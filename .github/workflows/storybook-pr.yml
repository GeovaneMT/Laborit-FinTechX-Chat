name: Storybook PR Comment

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-pr-${{ github.event.number }}
          path: storybook-static/
          retention-days: 30

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Storybook deployment

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📚 Storybook Deployment

            Storybook has been built and deployed for this PR.

            **View Storybook:** [storybook-pr-${{ github.event.number }}.brain-box.dev](https://storybook-pr-${{ github.event.number }}.brain-box.dev)

            ### What's included:
            - ✅ Interactive component stories
            - ✅ Accessibility testing results
            - ✅ Visual regression checks
            - ✅ TypeScript validation

            ### Component Stories Available:
            - Button (variants, sizes, effects)
            - Spinner (sizes, colors)
            - Form (validation, error states)
            - ButtonGroup (layouts, orientations)
            - Logo (themes, sizes)
            - ErrorCard (error types, actions)
            - LoadingPulse (indicators, contexts)
            - Separator (orientations, contexts)

            ---
            _This comment was automatically generated by the CI/CD pipeline._
          edit-mode: replace
