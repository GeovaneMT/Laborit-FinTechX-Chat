name: Security & Dependencies

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level moderate

      - name: Run knip (unused dependencies check)
        run: pnpm knip

  dependency-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated dependencies
        run: pnpm outdated --format json > outdated.json || true

      - name: Create issue for outdated dependencies
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outdated = JSON.parse(fs.readFileSync('outdated.json', 'utf8'));

            if (Object.keys(outdated).length > 0) {
              const body = `## 📦 Outdated Dependencies

              The following dependencies have available updates:

              ${Object.entries(outdated).map(([pkg, info]) => {
                return `### ${pkg}
                - Current: ${info.current}
                - Latest: ${info.latest}
                - Type: ${info.type}`;
              }).join('\n\n')}

              Consider updating these dependencies to get the latest features and security fixes.

              ---
              _This issue was automatically created by the weekly dependency check._`;

              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📦 Weekly Dependency Update Check',
                body: body,
                labels: ['dependencies', 'maintenance']
              });
            }
